<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Offline — Motiv</title>
  <style>
    /* Self-contained on purpose: this page is precached and must render with
       zero network. Colours mirror the charcoal brand vars in globals.css. */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      display: flex; align-items: center; justify-content: center;
      background: #0b0c11; color: #f6f6f7;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      padding: 24px; text-align: center;
    }
    .card { max-width: 360px; }
    .dot {
      width: 56px; height: 56px; margin: 0 auto 20px; border-radius: 50%;
      background: #17181e; border: 1px solid rgba(255,255,255,.07);
      display: flex; align-items: center; justify-content: center; font-size: 26px;
    }
    h1 { font-size: 20px; font-weight: 700; margin-bottom: 8px; }
    p { font-size: 14px; color: #9a9ca6; line-height: 1.5; margin-bottom: 24px; }
    button {
      appearance: none; border: 0; cursor: pointer;
      background: #2563eb; color: #fff; font-size: 14px; font-weight: 600;
      padding: 12px 28px; border-radius: 10px; min-height: 44px;
    }
    button:active { opacity: .85; }
  </style>
</head>
<body>
  <div class="card">
    <div class="dot">📡</div>
    <h1>You&rsquo;re offline</h1>
    <p>Motiv needs an internet connection. Check your signal or Wi&#8209;Fi and try again &mdash; nothing you submitted has been lost.</p>
    <button onclick="location.reload()">Try again</button>
  </div>
  <script>
    // Auto-retry the moment connectivity returns.
    window.addEventListener('online', function () { location.reload() })
  </script>
</body>
</html>

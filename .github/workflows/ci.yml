name: CI

# Runs on every PR into main and on direct pushes to main. Pair this with a
# branch-protection rule that REQUIRES the "build" job to pass before merging
# (Settings → Branches → Add rule → require status checks → "build") — the
# workflow reports status, but only branch protection actually blocks a red merge.
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  # Weekly scheduled run (Mon 05:00 UTC) so a NEW dependency advisory surfaces
  # within days even when no PRs are moving — the audit step below is the point;
  # the rest of the pipeline just proves main still builds green.
  schedule:
    - cron: '0 5 * * 1'

# A newer push to the same branch/PR cancels the older in-flight run.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Job id "build" IS the status-check context you require in branch protection.
  # Keep this id stable — renaming it breaks the required-check rule.
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      # npm ci = clean, lockfile-exact install (fails if package.json and
      # package-lock.json disagree). xlsx installs from the repo-vendored tarball
      # (vendor/xlsx-0.20.3.tgz) — no third-party CDN in the install path.
      - name: Install dependencies
        run: npm ci

      # Next.js incremental build cache — keyed on lockfile + source hash, with
      # a lockfile-only restore key so most pushes still get a warm cache. Cuts
      # the `next build` step's minutes; safe because next validates its cache.
      - name: Restore Next.js build cache
        uses: actions/cache@v6
        with:
          path: .next/cache
          key: nextjs-${{ hashFiles('package-lock.json') }}-${{ hashFiles('**/*.ts', '**/*.tsx') }}
          restore-keys: |
            nextjs-${{ hashFiles('package-lock.json') }}-

      # Cheap checks first so a red PR fails fast before the slow build.
      - name: Type-check
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint

      # Static consistency check of supabase/schema.sql (C9): every FK/policy/
      # alter/trigger must reference a table the file defines. Catches a folded
      # migration that forgot a CREATE or has a typo'd table name. (True live-DB
      # drift detection needs a pg_dump against prod with a DB-URL secret — noted
      # in the C9 tracker row.)
      - name: Schema consistency
        run: npm run schema:check

      # DB types (B20) are generated from schema.sql — regenerate and fail if the
      # committed lib/database.types.ts is stale (someone edited schema.sql without
      # running `npm run gen:types`).
      - name: DB types up to date
        run: npm run gen:types && git diff --exit-code -- lib/database.types.ts

      - name: Test
        run: npm test

      - name: Build
        run: npm run build
        # next build touches modules that read these at import time; real secrets
        # aren't needed to compile, so CI uses inert placeholders. All data access
        # is force-dynamic (runtime only), so nothing hits a real Supabase here.
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ci-placeholder-anon-key
          SUPABASE_SERVICE_ROLE_KEY: ci-placeholder-service-role-key
          NEXT_PUBLIC_APP_URL: https://example.com

      # Fail-on-high for production dependencies — BLOCKING: a new prod HIGH vuln
      # now fails CI. (Was non-blocking until B6 upgraded Next 14 -> 16, which
      # cleared the Next advisory bundle; `npm audit --omit=dev --audit-level=high`
      # is now 0-high — only moderates remain, via next's nested postcss.)
      - name: Audit (prod deps, high)
        run: npm audit --omit=dev --audit-level=high
